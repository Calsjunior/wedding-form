<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="./assets/wedding-arch-icon.png">
        <link rel="stylesheet" href="style.css">
        <title>Ever After Photography</title>
    </head>
    <body>
        <main class="auth-layout">
            <aside class="sidebar">
                <header></header>
                <img
                    class="sidebar__image"
                    src="./assets/wedding-photo.avif"
                    alt="An overhead shot of a wedding couple walking up the stairs"
                >
            </aside>

            <form class="form">
                <h1 class="form__title">Relive your <i>magic.</i></h1>

                <div class="form__container">
                    <div class="form__group">
                        <label class="form__label" for="first-name">First Name</label>
                        <input
                            class="form__field"
                            type="text"
                            id="first-name"
                            name="first-name"
                            required
                        >
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="last-name">Last Name</label>
                        <input
                            class="form__field"
                            type="text"
                            id="last-name"
                            name="last-name"
                            required
                        >
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="email">Email</label>
                        <input
                            class="form__field"
                            type="email"
                            id="email"
                            name="email"
                            required
                        >
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="password">Password</label>
                        <input
                            class="form__field form__field--password"
                            type="password"
                            id="password"
                            name="password"
                            required
                        >
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="password-confirm">
                            Confirm Password
                        </label>
                        <input
                            class="form__field"
                            type="password"
                            id="password-confirm"
                            name="password-confirm"
                            required
                        >
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="access-code">Access Code</label>
                        <input
                            class="form__field form__field--access"
                            type="password"
                            id="access-code"
                            name="access-code"
                            placeholder=" "
                            required
                        >
                        <svg
                            class="form__icon"
                            viewBox="0 0 32 32"
                            version="1.1"
                            xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true"
                        >
                            <path
                                d="M25 12.034l-14.28 0-0.518-2.321c-0.883-3.293 0.65-6.576 4.159-7.516 3.473-0.93 6.534 1.061 7.432 4.41l0.425 1.686c0.143 0.534 0.691 0.85 1.225 0.707s0.85-0.691 0.707-1.225l-0.425-1.687c-1.187-4.433-5.325-7.045-9.881-5.824-4.574 1.226-6.741 5.607-5.573 9.966l0.402 1.803h-1.673c-2.206 0-4 1.794-4 4v12c0 2.206 1.794 4 4 4h18c2.206 0 4-1.794 4-4v-12c0-2.206-1.794-4-4-4zM27 28.035c0 1.102-0.898 2-2 2h-18c-1.103 0-2-0.898-2-2v-12c0-1.102 0.897-2 2-2h18c1.102 0 2 0.898 2 2v12zM16 18.035c-1.104 0-2 0.895-2 2 0 0.738 0.405 1.376 1 1.723v3.277c0 0.552 0.448 1 1 1s1-0.448 1-1v-3.277c0.595-0.346 1-0.985 1-1.723 0-1.105-0.895-2-2-2z"
                            ></path>
                        </svg>
                    </div>

                    <div class="form__group form__group--full">
                        <button class="form__btn" type="submit">Enter the gallery</button>
                    </div>
                </div>
            </form>
        </main>
    </body>
</html>
