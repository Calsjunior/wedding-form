<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Ever After Photography</title>
    </head>
    <body>
        <main class="sign-up">
            <aside class="sign-up__sidebar">
                <img
                    class="sign-up__image"
                    src="./assets/wedding-photo.avif"
                    alt="An overhead shot of a wedding couple walking up the stairs">
            </aside>

            <form class="sign-up__form">
                <h1>Relive your magic</h1>

                <div class="sign_up__input">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>

                <div class="sign_up__input">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" name="last-name" required>
                </div>

                <div class="sign_up__input">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="sign_up__input">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="sign_up__input">
                    <label for="password-confirm">Confirm Password</label>
                    <input
                        type="password"
                        id="password-confirm"
                        name="password-confirm"
                        required>
                </div>

                <div class="sign_up__input">
                    <label for="access-code">Access Code</label>
                    <input type="numeric" id="access-code" name="access-code" required>
                </div>

                <div class="sign-up__btn">
                    <button type="submit">Enter the gallery</button>
                </div>
            </form>
        </main>
    </body>
</html>
