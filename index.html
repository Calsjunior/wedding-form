<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Ever After Photography</title>
    </head>
    <body>
        <main class="auth-layout">
            <aside class="sidebar">
                <img
                    class="sidebar__image"
                    src="./assets/wedding-photo.avif"
                    alt="An overhead shot of a wedding couple walking up the stairs">
            </aside>

            <form class="form">
                <h1 class="form__title">Relive your <i>magic.</i></h1>

                <div class="form__container">
                    <div class="form__group">
                        <label class="form__label" for="first-name">First Name</label>
                        <input
                            class="form__field"
                            type="text"
                            id="first-name"
                            name="first-name"
                            required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="last-name">Last Name</label>
                        <input
                            class="form__field"
                            type="text"
                            id="last-name"
                            name="last-name"
                            required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="email">Email</label>
                        <input
                            class="form__field"
                            type="email"
                            id="email"
                            name="email"
                            required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="password">Password</label>
                        <input
                            class="form__field"
                            type="password"
                            id="password"
                            name="password"
                            required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="password-confirm">
                            Confirm Password
                        </label>
                        <input
                            class="form__field"
                            type="password"
                            id="password-confirm"
                            name="password-confirm"
                            required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="access-code">Access Code</label>
                        <input
                            class="form__field"
                            type="text"
                            inputmode="numeric"
                            id="access-code"
                            name="access-code"
                            required>
                    </div>

                    <div class="form__group form__group--full">
                        <button type="submit" class="form__btn">Enter the gallery</button>
                    </div>
                </div>
            </form>
        </main>
    </body>
</html>
